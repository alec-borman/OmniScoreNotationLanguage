<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScore Visualizer: Custom Editor</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Tone.js for audio synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* General key styling */
        .white-key, .black-key {
            cursor: pointer;
            position: absolute;
            transition: background 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        /* White key specifics */
        .white-key {
            width: 40px;
            height: 180px;
            background: white;
            border: 1px solid #1f2937; /* Dark Gray */
            z-index: 10;
        }
        /* Black key specifics */
        .black-key {
            width: 25px;
            height: 120px;
            background: #1f2937; /* Dark Gray */
            z-index: 20;
            /* Black keys are centered over the join of the two white keys */
        }
        /* Active states for highlighting */
        .key-active-white {
            background: #fca5a5; /* Red-300 */
            box-shadow: 0 0 10px #f87171;
        }
        .key-active-black {
            background: #ef4444; /* Red-500 */
            box-shadow: 0 0 10px #ef4444;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center justify-center font-sans">

    <div class="max-w-4xl w-full bg-white shadow-xl rounded-xl p-8 space-y-6">
        <h1 class="text-3xl font-bold text-center text-gray-800">OmniScore Piano Visualizer & Editor (C3 to C6)</h1>
        <p class="text-center text-gray-600">The parser now supports **chords** (`[c4 e4 g4]:4`) and **dotted notes** (`1.`, `2.`, `4.`).</p>

        <!-- Piano Visualization Area - Wider for C3 to C6 -->
        <div id="piano-container" class="relative overflow-x-auto p-4 bg-gray-200 rounded-lg shadow-inner">
            <div id="keyboard" class="relative mx-auto" style="height: 200px;">
                <!-- Keys will be generated here -->
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-center space-x-4">
            <button id="playButton" class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition duration-300 disabled:bg-gray-400 disabled:cursor-not-allowed">
                Play Full Score
            </button>
            <button id="stopButton" class="px-6 py-3 bg-red-500 text-white font-semibold rounded-lg shadow-md hover:bg-red-600 transition duration-300 disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                Stop
            </button>
        </div>

        <!-- Status Message -->
        <div id="status" class="text-center text-sm text-gray-500 mt-4 h-6">Click 'Play Full Score' to start.</div>

        <!-- Editable OmniScore Input -->
        <div class="mt-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">Edit Your OmniScore Here:</h2>
            <textarea id="omni-input" class="w-full h-64 bg-gray-800 text-green-300 p-4 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-y"></textarea>
        </div>
    </div>

    <script>
        // Initial score is defined here to populate the textarea
        const initialOmniScoreCode = `
meta {
  title: "La cathédrale engloutie (The Sunken Cathedral)"
  composer: "Claude Debussy"
}

group "Piano" symbol=brace {
  def rh "Right Hand" style=standard clef=treble
  def lh "Left Hand"  style=standard clef=bass
}

// --- I. SUBMERGED BELLS (Measures 1-15) ---
instruction "Profondément calme; Dans une brume doucement sonore"
// Note: Tempo and time signature affect beat duration, but the note durations (1., 4, 2) are relative to the beat.
meta { tempo: 60, time: 6/4 }

measure 1
  rh: [e4 g4 c5]:1. | // Dotted Whole (6 beats in 6/4)
  lh: [c2 c3]:1.    |
measure 2
  rh: [d4 a4 d5]:1. |
  lh: [d2 d3]:1.    |
measure 3
  rh: [e4 g4 c5]:1. |
  lh: [c2 c3]:1.    |
measure 4
  rh: [d4 g4 c5]:1. |
  lh: [c2 c3]:1.    |

measure 5
  meta { time: 3/2 } instruction "pp"
  // Note: In 3/2 time, a Half note (2) is 1 beat. A Whole note (1) is 2 beats.
  // The parser uses the quarter note (4) as the base beat (1 quarter note = 1 beat duration).
  // [c4 f4 a4]:2 (Half note = 2 quarter notes = 2 beats) [d4 g4 b4]:2 (2 beats)
  rh: [c4 f4 a4]:2 [d4 g4 b4]:2 |
  // [c2 c3]:1 (Whole note = 4 quarter notes = 4 beats) 
  // Since this piece uses complex time signatures like 6/4 and 3/2, the duration map is based 
  // on *relative* quarter note equivalents for simplicity in this visualization.
  lh: [c2 c3]:1                 | 
measure 6
  rh: [e4 g4 c5]:2 [d4 g4 c5]:2 |
  lh: [e2 e3]:1                 |
measure 7
  meta { time: 4/4 } instruction "Un peu moins lent"
  rh: [f4 a4 d5]:2 [g4 b4 e5]:2 |
  lh: [a2 a3]:2. [g2 g3]:2.    | // Dotted Half (3 beats in 4/4)

measure 8
  meta { time: 6/4 }
  rh: [c5]:4 [b4]:4 [c5]:4 [e5]:4 |
  lh: c3:1. |
measure 9
  rh: [e5]:4 [f5]:4 [g5]:4 [c5]:4 |
  lh: g2:1. |
measure 10
  rh: [g4]:4 [a4]:4 [b4]:4 [d5]:4 |
  lh: d3:1. |
measure 11
  rh: [c5]:4 [b4]:4 [c5]:4 [e5]:4 |
  lh: c3:1. |
measure 12..15
  rh: r:1 | 
  lh: r:1 | 

%% --- II. CATHEDRAL RISES (Measures 16-46, showing peak texture) ---
measure 16
  instruction "peu à peu sortant de la brume"
  rh: [c5 e5 g5 c6]:1. |
  lh: [c3 c4]:1.       |
measure 17
  rh: [d5 f#5 a5 d6]:1. |
  lh: [d3 d4]:1.         |
measure 18
  rh: [e5 g5 b5 e6]:1. |
  lh: [e3 e4]:1.       |
measure 19
  rh: [f5 a5 c6 f6]:1. |
  lh: [f3 f4]:1.       |
measure 20
  rh: [g5 b5 d6 g6]:1. |
  lh: [g3 g4]:1.       |
measure 21
  instruction "Marquez ces doubles croches"
  // Note: 16th notes (16) are not currently supported by the parser (only 1, 2, 4, 8)
  rh: c5:8 b4:8 a4:8 g4:8 f4:8 e4:8 d4:8 c4:8 |
  lh: c4:1. |

measure 22
  meta { time: 3/4 } instruction "Sonore sans dureté ff"
  rh: [a4 c5 e5 a5]:4 [g4 b4 d5 g5]:4 [a4 c5 e5 a5]:4 |
  lh: [a3 a4]:4 [g3 g4]:4 [a3 a4]:4                   |
measure 23
  rh: [b4 d5 f5 b5]:4 [a4 c5 e5 a5]:4 [b4 d5 f5 b5]:4 |
  lh: [b3 b4]:4 [a3 a4]:4 [b3 b4]:4                   |
measure 24
  rh: [c5 e5 g5 c6]:4 [b4 d5 f5 b5]:4 [c5 e5 g5 c6]:4 |
  lh: [c4 c5]:4 [b3 b4]:4 [c4 c5]:4                   |
measure 25
  instruction "fff"
  rh: [d5 f5 a5 d6]:4 [c5 e5 g5 c6]:4 [d5 f5 a5 d6]:4 |
  lh: [d4 d5]:4 [c4 c5]:4 [d4 d5]:4                   |
measure 26
  rh: [e5 g5 b5 e6]:4 [d5 f5 a5 d6]:4 [e5 g5 b5 e6]:4 |
  lh: [e4 e5]:4 [d4 d5]:4 [e4 e5]:4                   |
measure 27..22 | %% ... Measures 27-46 contain descending arpeggios and block chords ...
  rh: r:1 |
  lh: r:1 | 

%% --- III. RETURN TO THE DEPTHS (Measures 67-89) ---
measure 67
  meta { time: 6/4 } instruction "Retrouvez le Mouvement du début"
  rh: [e4 g4 c5]:1. |
  lh: [c2 c3]:1.    |
measure 68
  rh: [d4 a4 d5]:1. |
  lh: [d2 d3]:1.    |
measure 69
  rh: [e4 g4 c5]:1. |
  lh: [c2 c3]:1.    |
measure 70
  rh: [d4 g4 c5]:1. |
  lh: [c2 c3]:1.    |
measure 71
  meta { time: 3/2 } instruction "pp"
  rh: [c4 f4 a4]:2 [d4 g4 b4]:2 |
  lh: [c2 c3]:1                 |

measure 84
  instruction "Très lent ppp (pianississimo)"
  rh: [e4 g4 c5]:1. |
  lh: [c2 c3]:1.    |
measure 85
  rh: [e4 g4 c5]:1. |
  lh: [c2 c3]:1.    |
measure 86
  rh: [c4 e4 g4]:1. |
  lh: [c2 c3]:1.    |
measure 87
  rh: [c4 e4 g4]:1. |
  lh: [c2 c3]:1.    |
measure 88
  rh: [c4 e4 g4]:1. |
  lh: [c2 c3]:1.    |
measure 89
  rh: [c4 e4 g4]:1. |
  lh: [c2 c3]:1. |
`;
        
        const playButton = document.getElementById('playButton');
        const stopButton = document.getElementById('stopButton');
        const statusDiv = document.getElementById('status');
        const keyboardDiv = document.getElementById('keyboard');
        const omniInput = document.getElementById('omni-input'); 

        let isPlaying = false;
        let scheduledEvents = [];

        // --- Tone.js Setup ---
        // Adjusted PolySynth envelope for a more piano-like, percussive sound
        const synth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sawtooth" },
            envelope: {
                attack: 0.002, 
                decay: 0.4,    
                sustain: 0.05, 
                release: 0.8   
            }
        }).toDestination();
        
        const tempo = 100; // BPM (fixed base tempo for duration calculations)
        const beatDuration = 60 / tempo; // seconds per beat

        // Map OmniScore duration fractions to Tone.js friendly durations (seconds)
        // Now includes dotted notes! (Calculated relative to the base quarter note beatDuration)
        const durationMap = {
            '1': 4 * beatDuration,   // Whole note (4 quarter beats)
            '2': 2 * beatDuration,   // Half note (2 quarter beats)
            '4': 1 * beatDuration,   // Quarter note (1 quarter beat)
            '8': 0.5 * beatDuration, // Eighth note (0.5 quarter beats)
            '1.': 6 * beatDuration,  // Dotted Whole note (6 quarter beats)
            '2.': 3 * beatDuration,  // Dotted Half note (3 quarter beats)
            '4.': 1.5 * beatDuration,// Dotted Quarter note (1.5 quarter beats)
        };

        // --- Keyboard Visualization Functions ---

        function createKeyboard() {
            // Displayed range is 3 octaves: C3 to C6
            const whiteKeyNames = [
                'C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3',
                'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4',
                'C5', 'D5', 'E5', 'F5', 'G5', 'A5', 'B5',
                'C6' 
            ];
            const blackKeyNames = [
                'C#3', 'D#3', 'F#3', 'G#3', 'A#3',
                'C#4', 'D#4', 'F#4', 'G#4', 'A#4',
                'C#5', 'D#5', 'F#5', 'G#5', 'A#5'
            ];
            
            const whiteKeyWidth = 40;
            const keyboardWidth = whiteKeyNames.length * whiteKeyWidth;
            const blackKeyWidth = 25;

            keyboardDiv.style.width = `${keyboardWidth}px`; 
            keyboardDiv.innerHTML = ''; 

            let currentX = 0; 
            let blackKeyIndex = 0;

            const appendKey = (name, isBlack, xPos) => {
                const key = document.createElement('div');
                // ID uses 's' for sharp (e.g., C#4 -> Cs4)
                key.id = 'key-' + name.toLowerCase().replace('#', 's');
                key.style.position = 'absolute';
                key.style.left = `${xPos}px`;
                key.style.zIndex = isBlack ? 20 : 10;

                if (isBlack) {
                    key.className = 'black-key rounded-b-md';
                } else {
                    key.className = 'white-key rounded-b-md flex flex-col justify-end items-center text-xs font-bold text-gray-700';
                    const label = document.createElement('span');
                    label.textContent = name;
                    label.className = 'mb-2';
                    key.appendChild(label);
                }
                keyboardDiv.appendChild(key);
            };

            for (let i = 0; i < whiteKeyNames.length; i++) {
                const name = whiteKeyNames[i];
                
                appendKey(name, false, currentX);

                if (name.includes('C') || name.includes('D') || name.includes('F') || name.includes('G') || name.includes('A')) {
                    if (blackKeyIndex < blackKeyNames.length) {
                        const sharpX = currentX + (whiteKeyWidth - (blackKeyWidth / 2)); 
                        appendKey(blackKeyNames[blackKeyIndex], true, sharpX);
                        blackKeyIndex++;
                    }
                }

                currentX += whiteKeyWidth; 
            }
        }

        // --- REFACTORED OmniScore Parsing ---
        function parseOmniScore(code) {
            const events = [];
            
            // 1. Identify Hand/Measure Content
            const parts = [
                { hand: 'RH', pattern: /rh:\s*([^|]+)/g },
                { hand: 'LH', pattern: /lh:\s*([^|]+)/g },
            ];
            
            // 2. Regex to match a complete note/chord chunk: 
            // Group 1: Whole Chunk (e.g., [c4 e4 g4]:4 or d4:8 or r:4)
            // (?:\[[^\]]+\]|r|[a-g][#b]?\d):(?:[1248]\.?)
            const chunkRegex = /((?:\[[^\]]+\]|r|[a-g][#b]?\d):(?:[1248]\.?))/g;

            parts.forEach(part => {
                let currentTime = 0;
                part.pattern.lastIndex = 0;

                let measureMatch;
                while ((measureMatch = part.pattern.exec(code)) !== null) {
                    const notesString = measureMatch[1].trim();
                    
                    chunkRegex.lastIndex = 0;
                    let chunkMatch;

                    // Iterate through chunks in the measure string
                    while ((chunkMatch = chunkRegex.exec(notesString)) !== null) {
                        const chunk = chunkMatch[0]; // e.g., '[e4 g4 c5]:1.' or 'e4:4'
                        
                        // Split the chunk into content (notes/rests) and duration string
                        const [content, durationStr] = chunk.split(':');

                        const duration = durationMap[durationStr];
                        if (!duration) {
                            throw new Error(`Invalid duration '${durationStr}' found. Please use supported durations (1, 2, 4, 8) or dotted notes (1., 2., 4.).`);
                        }

                        let notesToSchedule = [];
                        if (content.startsWith('[')) {
                            // CHORD: Extract notes from inside the brackets
                            const innerNotes = content.slice(1, -1).trim(); // Remove []
                            notesToSchedule = innerNotes.split(/\s+/).filter(n => n); 
                        } else {
                            // SINGLE NOTE or REST
                            notesToSchedule = [content];
                        }

                        notesToSchedule.forEach(note => {
                            if (note.toUpperCase() === 'R') {
                                return; // Skip rests
                            }
                            
                            // Format note for Tone.js (e.g., F#5)
                            // The regex ensures the structure is [a-g][#b]?\d
                            const toneJsNote = note.charAt(0).toUpperCase() + note.slice(1).toLowerCase();

                            events.push({
                                note: toneJsNote, // e.g., F#5
                                duration: duration,
                                time: currentTime,
                                hand: part.hand
                            });
                        });
                        
                        // Advance time by the duration of the chunk (note, rest, or chord)
                        currentTime += duration;
                    }
                }
            });

            // CRITICAL: Sort events chronologically to interleave RH and LH notes correctly
            events.sort((a, b) => a.time - b.time);

            return events;
        }

        // --- Scheduling and Playback (Logic unchanged) ---

        function playScore(parsedEvents) {
            if (isPlaying) return;

            Tone.Transport.stop();
            Tone.Transport.cancel(0);
            scheduledEvents = [];
            isPlaying = true;
            statusDiv.className = 'text-center text-sm text-blue-600 mt-4 h-6';
            statusDiv.textContent = 'Playing Full Score...';
            playButton.disabled = true;
            stopButton.disabled = false;
            
            // Highlight off all keys
            document.querySelectorAll('.white-key, .black-key').forEach(key => {
                key.classList.remove('key-active-white', 'key-active-black');
            });
            
            // Schedule the notes
            parsedEvents.forEach(item => {
                // item.note is in Tone.js format (C4, F#5)
                
                // Convert C#4 -> Cs4 for ID lookup
                const noteId = 'key-' + item.note.toLowerCase().replace('#', 's');
                const keyElement = document.getElementById(noteId);
                
                // Check if the note has a sharp/flat to determine key color
                const isBlack = item.note.includes('#') || item.note.includes('b'); 
                const activeClass = isBlack ? 'key-active-black' : 'key-active-white';
                
                // 1. Schedule the Note Playback
                const noteEvent = Tone.Transport.schedule(time => {
                    synth.triggerAttackRelease(item.note, item.duration, time);
                }, item.time);
                scheduledEvents.push(noteEvent);

                // 2. Schedule the Visual On state
                const visualOnEvent = Tone.Transport.schedule(time => {
                    if (keyElement) {
                        Tone.Draw.schedule(() => {
                            keyElement.classList.add(activeClass);
                        }, time);
                    }
                }, item.time);
                scheduledEvents.push(visualOnEvent);
                
                // 3. Schedule the Visual Off state (slightly before the next note/end of duration)
                const visualOffEvent = Tone.Transport.schedule(time => {
                    if (keyElement) {
                        Tone.Draw.schedule(() => {
                            keyElement.classList.remove(activeClass);
                        }, time);
                    }
                }, item.time + item.duration - 0.05); 
                scheduledEvents.push(visualOffEvent);
            });
            
            // Schedule stop/cleanup at the very end
            const lastEvent = parsedEvents[parsedEvents.length - 1];
            let totalDuration = 0;
            if (lastEvent) {
                totalDuration = lastEvent.time + lastEvent.duration;
            }
            
            const endEvent = Tone.Transport.schedule(stopPlayback, totalDuration);
            scheduledEvents.push(endEvent);

            Tone.Transport.start();
        }
        
        function stopPlayback() {
            if (!isPlaying) return;
            
            Tone.Transport.stop();
            Tone.Transport.cancel(0);
            
            isPlaying = false;
            statusDiv.className = 'text-center text-sm text-gray-500 mt-4 h-6';
            statusDiv.textContent = 'Ready to play.';
            playButton.disabled = false;
            stopButton.disabled = true;

            // Remove all visual highlights
            document.querySelectorAll('.white-key, .black-key').forEach(key => {
                key.classList.remove('key-active-white', 'key-active-black');
            });
        }
        
        // --- Initialization ---

        window.onload = function() {
            // 1. Populate the editor with the initial score
            omniInput.value = initialOmniScoreCode.trim();

            // 2. Build the keyboard
            createKeyboard();

            // 3. Attach event listeners
            playButton.addEventListener('click', async () => {
                const currentOmniScoreCode = omniInput.value;

                if (Tone.Transport.state !== 'started') {
                    await Tone.start();
                    Tone.Context.lookAhead = 0.1; 
                }
                
                stopPlayback(); 

                try {
                    const parsedEvents = parseOmniScore(currentOmniScoreCode);
                    
                    if (parsedEvents.length === 0) {
                        statusDiv.className = 'text-center text-sm text-orange-600 mt-4 h-6';
                        statusDiv.textContent = 'Warning: No musical notes found in the score.';
                        return;
                    }
                    
                    playScore(parsedEvents);

                } catch (error) {
                    statusDiv.className = 'text-center text-sm text-red-600 mt-4 h-6';
                    statusDiv.textContent = 'Parsing Error: ' + error.message;
                    console.error('Parsing/Playback Error:', error);
                    stopPlayback(); 
                }
            });

            stopButton.addEventListener('click', stopPlayback);
        }

    </script>
</body>
</html>
