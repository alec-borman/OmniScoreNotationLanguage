<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScore 1.1.0 Specification Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafaf9; /* Stone 50 */
            color: #44403c; /* Stone 700 */
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f4;
        }
        ::-webkit-scrollbar-thumb {
            background: #d6d3d1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e;
        }

        .code-block {
            background-color: #292524;
            color: #e7e5e4;
            font-family: 'Courier New', Courier, monospace;
        }

        .active-nav {
            background-color: #e7e5e4; /* Stone 200 */
            border-left: 4px solid #ea580c; /* Orange 600 */
            font-weight: 600;
        }

        .step-connector::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            width: 2rem;
            height: 2px;
            background-color: #d6d3d1;
            transform: translateY(-50%);
            z-index: 0;
        }
        .step-connector:last-child::after {
            display: none;
        }
    </style>
    <!-- Chosen Palette: Warm Neutrals (Stone/Orange) - Minimalist, Academic, Paper-like feel -->
    <!-- Application Structure Plan: 
         1. Dashboard Layout: Sidebar for major sections, main content area for dynamic rendering.
         2. Sectioning:
            - "Overture" (Overview): Meta-stats, Philosophy, version info.
            - "Architecture": Visualizing the compilation pipeline and coordinate system.
            - "The Physics" (Definitions): Interactive instrument setup guide.
            - "The Notation" (Events/Syntax): Tabbed views for different engines (Pitch, Rhythm, Tab).
            - "Reference" (Library/Errors): Searchable data tables and charts for error types.
         3. Rationale: The spec is dense. Grouping by "Purpose" (Architecture vs. Writing vs. Reference) is better than a linear read.
    -->
    <!-- Visualization & Content Choices:
         - Spec Feature Breakdown (Doughnut Chart): Goal -> Inform -> Shows the weight of different language modules -> Chart.js.
         - Error Taxonomy (Bar Chart): Goal -> Compare -> Visualizes the strictness of error levels -> Chart.js.
         - Compilation Pipeline (CSS Stepper): Goal -> Change -> Interactive flow to explain the build process -> HTML/CSS/JS.
         - Data Types Table (HTML Table + Filter): Goal -> Organize -> Searchable reference for syntax rules -> JS Filtering.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-stone-100 border-r border-stone-200 flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6 border-b border-stone-200">
            <h1 class="text-2xl font-bold text-stone-800">OmniScore</h1>
            <p class="text-xs text-stone-500 mt-1 uppercase tracking-wider">Spec Explorer v1.1.0</p>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1" id="nav-list">
                <!-- Nav Items Injected by JS -->
            </ul>
        </nav>
        <div class="p-4 border-t border-stone-200 bg-stone-50">
            <div class="text-xs text-stone-400">
                Maintained by<br>OmniScore Working Group
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="md:hidden bg-stone-100 border-b border-stone-200 p-4 flex justify-between items-center z-20">
            <h1 class="text-xl font-bold text-stone-800">OmniScore</h1>
            <button id="menu-btn" class="text-stone-600 focus:outline-none">☰</button>
        </header>

        <!-- Dynamic Content Scroll Area -->
        <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth">
            <!-- Content Injected Here -->
        </div>
    </main>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="absolute inset-0 bg-stone-100 z-50 transform -translate-x-full transition-transform duration-300 md:hidden flex flex-col">
        <div class="p-4 flex justify-between items-center border-b border-stone-200">
            <h2 class="font-bold text-lg">Menu</h2>
            <button id="close-menu" class="text-2xl">&times;</button>
        </div>
        <nav class="flex-1 overflow-y-auto p-4">
            <ul class="space-y-2" id="mobile-nav-list"></ul>
        </nav>
    </div>

    <script>
        // --- Data Source: OmniScore v1.1.0 Specification ---
        const omniScoreData = {
            metadata: {
                version: "1.1.0",
                status: "Normative",
                license: "MIT",
                maintainer: "The OmniScore Working Group"
            },
            overview: {
                philosophy: [
                    { title: "Inference Over Redundancy", desc: "Attributes like duration and octave persist until changed ('Sticky State')." },
                    { title: "Semantic Separation", desc: "Instrument definitions (physics) are separate from event data (notes)." },
                    { title: "Human Readability", desc: "Source code is intelligible to musicians without rendering software." }
                ],
                stats: {
                    modules: 12,
                    dataTypes: 8,
                    errorCodes: 6
                }
            },
            pipeline: [
                { step: 1, title: "Lexing/Parsing", detail: "Tokenize text and validate against EBNF grammar." },
                { step: 2, title: "Context Building", detail: "Process meta/def blocks to establish global physics." },
                { step: 3, title: "Linearization", detail: "Resolve sticky attributes & calculate absolute ticks." },
                { step: 4, title: "Rendering", detail: "Map linearized data to SVG, MIDI, or MusicXML." }
            ],
            syntax: {
                literals: [
                    { type: "Integer", syntax: "[0-9]+", ex: "1, 120", desc: "Octaves, BPM, counts" },
                    { type: "Float", syntax: "[0-9]+\.[0-9]+", ex: "1.5", desc: "Duration multipliers" },
                    { type: "Pitch", syntax: "[a-g][#|b|x]*[0-9]", ex: "c4, f#5", desc: "Scientific Pitch" },
                    { type: "TabCoord", syntax: "[0-9]+-[0-9]+", ex: "0-6", desc: "Fret-String" },
                    { type: "Map", syntax: "{ key: val }", ex: "{ k:0 }", desc: "Configuration pairs" }
                ],
                durations: [
                    { logic: "Quarter", syntax: ":4", symbol: "♩" },
                    { logic: "Eighth", syntax: ":8", symbol: "♪" },
                    { logic: "Sixteenth", syntax: ":16", symbol: "♬" },
                    { logic: "Dotted Q", syntax: ":4.", symbol: "♩." },
                    { logic: "Whole", syntax: ":1", symbol: "𝅝" }
                ]
            },
            engines: [
                {
                    id: "standard",
                    title: "Standard Pitch",
                    desc: "Default engine for pitched instruments using Scientific Pitch Notation.",
                    features: ["Sticky Octaves", "Explicit Accidentals", "Chord Brackets []", "Ties ~"]
                },
                {
                    id: "tab",
                    title: "Tablature",
                    desc: "Engine for fretted instruments using coordinate system.",
                    features: ["Fret-String Syntax", "Bends .bu()", "Slides .sl", "Strums .down/.up"]
                },
                {
                    id: "grid",
                    title: "Percussion Grid",
                    desc: "Engine for unpitched rhythmic triggers mapped to staff lines.",
                    features: ["Mapped Keys", "Ghost Notes", "Rolls", "Flams"]
                }
            ],
            errors: [
                { code: "E101", level: "Fatal", name: "SYNTAX_ERR", desc: "Malformed token or illegal character." },
                { code: "E201", level: "Fatal", name: "DEF_MISSING", desc: "Staff ID used but not defined." },
                { code: "E301", level: "Error", name: "VOICE_SYNC", desc: "Voice durations do not match." },
                { code: "E302", level: "Error", name: "TIME_OVERFLOW", desc: "Event exceeds Time Signature." },
                { code: "W401", level: "Warning", name: "BEAM_OPEN", desc: "Beam not ended; auto-closed." },
                { code: "W402", level: "Warning", name: "OCTAVE_JUMP", desc: "Large octave jump detected." }
            ],
            example: `omniscore
  meta { title: "Kitchen Sink", tempo: 130 }

  group "Rhythm" symbol=bracket {
    def sax "Tenor" style=standard transpose=-14
    def gtr "Guitar" style=tab tuning=guitar_std
  }

  measure 1
    %% Sticky Logic + Articulation
    sax: c4:4.acc e g c5.stacc |
    
    %% Tab Strumming
    gtr: [0-6 2-5 2-4]:4.down r:2 |`
        };

        // --- State Management ---
        const state = {
            currentTab: 'overview',
            pipelineStep: 0,
            searchQuery: ''
        };

        // --- Render Functions ---

        function init() {
            renderNavigation();
            renderContent(state.currentTab);
            document.getElementById('menu-btn').addEventListener('click', toggleMobileMenu);
            document.getElementById('close-menu').addEventListener('click', toggleMobileMenu);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('-translate-x-full');
        }

        function renderNavigation() {
            const sections = [
                { id: 'overview', label: 'Overture', icon: '🎵' },
                { id: 'architecture', label: 'Architecture', icon: '🏛️' },
                { id: 'syntax', label: 'Syntax & Data', icon: '📝' },
                { id: 'engines', label: 'The Engines', icon: '⚙️' },
                { id: 'reference', label: 'Reference & Errors', icon: '📚' }
            ];

            const navList = document.getElementById('nav-list');
            const mobileNavList = document.getElementById('mobile-nav-list');
            
            const generateHTML = (id, label, icon) => `
                <li>
                    <button onclick="navigateTo('${id}')" 
                        class="w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 transition-colors ${state.currentTab === id ? 'active-nav text-stone-800' : 'text-stone-600 hover:bg-stone-200'}">
                        <span>${icon}</span>
                        <span>${label}</span>
                    </button>
                </li>
            `;

            navList.innerHTML = sections.map(s => generateHTML(s.id, s.label, s.icon)).join('');
            mobileNavList.innerHTML = sections.map(s => generateHTML(s.id, s.label, s.icon)).join('');
        }

        function navigateTo(tabId) {
            state.currentTab = tabId;
            renderNavigation();
            renderContent(tabId);
            // Close mobile menu if open
            document.getElementById('mobile-menu').classList.add('-translate-x-full');
        }

        function renderContent(tabId) {
            const container = document.getElementById('content-area');
            container.innerHTML = ''; // Clear current content

            switch(tabId) {
                case 'overview': renderOverview(container); break;
                case 'architecture': renderArchitecture(container); break;
                case 'syntax': renderSyntax(container); break;
                case 'engines': renderEngines(container); break;
                case 'reference': renderReference(container); break;
            }
        }

        // --- Section Renderers ---

        function renderOverview(container) {
            container.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-8 animate-fade-in">
                    <!-- Header -->
                    <div class="text-center mb-10">
                        <span class="bg-orange-100 text-orange-800 text-xs font-semibold px-2.5 py-0.5 rounded border border-orange-200 uppercase">Version ${omniScoreData.metadata.version}</span>
                        <h2 class="text-4xl md:text-5xl font-serif font-bold text-stone-800 mt-4 mb-2">OmniScore</h2>
                        <p class="text-xl text-stone-600 italic">"What Mermaid is to charts, OmniScore is to music."</p>
                    </div>

                    <!-- Intro Text -->
                    <div class="prose prose-stone max-w-none text-stone-600 mb-8 p-6 bg-white rounded-xl shadow-sm border border-stone-100">
                        <p>
                            OmniScore is a declarative, domain-specific language (DSL) for describing musical logic. 
                            It prioritizes <strong>musical intent</strong> over visual layout. This application helps you explore the syntax, 
                            engines, and architectural principles defined in the Normative Specification.
                        </p>
                    </div>

                    <!-- Philosophy Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${omniScoreData.overview.philosophy.map(p => `
                            <div class="bg-white p-6 rounded-xl shadow-sm border-t-4 border-orange-500 hover:shadow-md transition-shadow">
                                <h3 class="font-bold text-lg mb-2 text-stone-800">${p.title}</h3>
                                <p class="text-sm text-stone-600 leading-relaxed">${p.desc}</p>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Feature Breakdown Chart -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center mt-8">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-100">
                            <h3 class="font-bold text-stone-700 mb-4 text-center">Language Feature Distribution</h3>
                            <div class="chart-container">
                                <canvas id="featureChart"></canvas>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <h3 class="font-serif text-2xl font-bold text-stone-800">Designed for Humans</h3>
                            <p class="text-stone-600">
                                Unlike XML formats which are verbose and machine-centric, OmniScore uses a logic-first approach. 
                                The chart illustrates the balance of the specification, focusing heavily on core musical logic and engine definitions rather than purely visual attributes.
                            </p>
                            <div class="flex gap-4 text-sm">
                                <div class="px-4 py-2 bg-stone-200 rounded text-stone-700"><strong>Status:</strong> ${omniScoreData.metadata.status}</div>
                                <div class="px-4 py-2 bg-stone-200 rounded text-stone-700"><strong>License:</strong> ${omniScoreData.metadata.license}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Initialize Chart
            setTimeout(() => {
                const ctx = document.getElementById('featureChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Core Logic', 'Instrument Physics', 'Engines (Tab/Perc)', 'Advanced/Meta'],
                        datasets: [{
                            data: [35, 25, 25, 15], // Conceptual weight based on readme sectioning
                            backgroundColor: ['#ea580c', '#fb923c', '#fdba74', '#fed7aa'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Inter' } } }
                        }
                    }
                });
            }, 0);
        }

        function renderArchitecture(container) {
            container.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-12 animate-fade-in">
                    <!-- Intro -->
                    <div class="mb-8">
                        <h2 class="text-3xl font-serif font-bold text-stone-800 mb-2">System Architecture</h2>
                        <p class="text-stone-600">Understanding how OmniScore processes text into music and handles logical space.</p>
                    </div>

                    <!-- Compilation Pipeline (Interactive) -->
                    <div class="bg-white p-8 rounded-xl shadow-sm border border-stone-200">
                        <h3 class="text-xl font-bold text-stone-800 mb-6">The Compilation Pipeline</h3>
                        
                        <!-- Stepper Visual -->
                        <div class="flex flex-col md:flex-row justify-between items-center relative mb-8 gap-4 md:gap-0">
                             ${omniScoreData.pipeline.map((step, index) => `
                                <div class="relative z-10 flex flex-col items-center group cursor-pointer w-full md:w-auto step-connector" onclick="showPipelineDetail(${index})">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg transition-all duration-300
                                        ${state.pipelineStep === index ? 'bg-orange-600 text-white shadow-lg scale-110' : 'bg-stone-200 text-stone-500 hover:bg-orange-200'}">
                                        ${step.step}
                                    </div>
                                    <span class="mt-2 text-sm font-medium ${state.pipelineStep === index ? 'text-orange-700' : 'text-stone-500'}">${step.title}</span>
                                </div>
                             `).join('')}
                        </div>

                        <!-- Detail Box -->
                        <div id="pipeline-detail" class="bg-stone-50 p-6 rounded-lg border-l-4 border-orange-500 transition-all">
                            <h4 class="font-bold text-stone-800 mb-1" id="pipe-title">${omniScoreData.pipeline[0].title}</h4>
                            <p class="text-stone-600" id="pipe-desc">${omniScoreData.pipeline[0].detail}</p>
                        </div>
                    </div>

                    <!-- Coordinate System (Visual) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white p-8 rounded-xl shadow-sm border border-stone-200 flex flex-col justify-center">
                            <h3 class="text-xl font-bold text-stone-800 mb-4">The Logical Grid (3D)</h3>
                            <div class="relative w-full h-64 bg-stone-50 rounded-lg border border-dashed border-stone-300 flex items-center justify-center overflow-hidden">
                                <!-- Z Axis -->
                                <div class="absolute w-1 h-48 bg-blue-200 rounded"></div>
                                <span class="absolute top-4 text-xs font-bold text-blue-400">Voices (Z)</span>
                                
                                <!-- Y Axis -->
                                <div class="absolute w-1 h-32 bg-green-200 rotate-90 rounded"></div>
                                <span class="absolute left-4 text-xs font-bold text-green-500">Source (Y)</span>

                                <!-- X Axis -->
                                <div class="absolute w-48 h-1 bg-orange-400 rounded shadow-sm z-10"></div>
                                <span class="absolute right-4 bottom-1/2 translate-y-4 text-xs font-bold text-orange-600">Time (X)</span>
                                
                                <!-- Measure Blocks -->
                                <div class="absolute w-12 h-8 border-2 border-orange-300 bg-orange-50/50 z-20 flex items-center justify-center text-[10px] text-orange-800 font-mono">M1</div>
                                <div class="absolute w-12 h-8 border-2 border-orange-300 bg-orange-50/50 z-20 translate-x-16 flex items-center justify-center text-[10px] text-orange-800 font-mono">M2</div>
                            </div>
                        </div>
                        <div class="flex flex-col justify-center space-y-4">
                            <h3 class="font-serif text-2xl font-bold text-stone-800">The 3-Axis Model</h3>
                            <p class="text-stone-600">OmniScore maps music onto a strict logical grid rather than a page layout.</p>
                            <ul class="space-y-3">
                                <li class="flex items-start gap-2">
                                    <span class="font-bold text-orange-600">X-Axis (Time):</span>
                                    <span class="text-sm text-stone-600">Linear absolute time, segmented by Measure blocks.</span>
                                </li>
                                <li class="flex items-start gap-2">
                                    <span class="font-bold text-green-600">Y-Axis (Source):</span>
                                    <span class="text-sm text-stone-600">Distinct logical threads defined by Staff IDs.</span>
                                </li>
                                <li class="flex items-start gap-2">
                                    <span class="font-bold text-blue-600">Z-Axis (Polyphony):</span>
                                    <span class="text-sm text-stone-600">Vertical layering within a single time/source coordinate (Voices).</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        }

        window.showPipelineDetail = function(index) {
            state.pipelineStep = index;
            renderArchitecture(document.getElementById('content-area')); // Re-render to update classes
        }

        function renderSyntax(container) {
            container.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-8 animate-fade-in">
                    <div class="mb-6">
                        <h2 class="text-3xl font-serif font-bold text-stone-800 mb-2">Lexical Structure & Syntax</h2>
                        <p class="text-stone-600">Reference for data types, literals, and duration logic.</p>
                    </div>

                    <!-- Search Mock -->
                    <div class="relative mb-6">
                        <input type="text" placeholder="Filter data types..." oninput="filterSyntaxTable(this.value)" 
                            class="w-full p-3 pl-10 rounded-lg border border-stone-300 focus:outline-none focus:ring-2 focus:ring-orange-500 bg-white shadow-sm">
                        <span class="absolute left-3 top-3.5 text-stone-400">🔍</span>
                    </div>

                    <!-- Data Types Table -->
                    <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-stone-100 text-stone-700 text-sm uppercase">
                                <tr>
                                    <th class="p-4 font-semibold">Type</th>
                                    <th class="p-4 font-semibold">Syntax</th>
                                    <th class="p-4 font-semibold">Example</th>
                                    <th class="p-4 font-semibold">Description</th>
                                </tr>
                            </thead>
                            <tbody id="syntax-tbody" class="text-stone-600 text-sm divide-y divide-stone-100">
                                ${omniScoreData.syntax.literals.map(l => `
                                    <tr class="hover:bg-orange-50 transition-colors">
                                        <td class="p-4 font-bold text-stone-800">${l.type}</td>
                                        <td class="p-4 font-mono text-orange-700 bg-stone-50 rounded">${l.syntax}</td>
                                        <td class="p-4 font-mono">${l.ex}</td>
                                        <td class="p-4">${l.desc}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <!-- Duration Logic -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200">
                            <h3 class="font-bold text-lg mb-4 text-stone-800">Duration Syntax</h3>
                            <p class="text-sm text-stone-600 mb-4">OmniScore treats music as a linear stream. Sticky state applies here.</p>
                            <div class="flex flex-wrap gap-2">
                                ${omniScoreData.syntax.durations.map(d => `
                                    <div class="flex items-center gap-2 bg-stone-50 px-3 py-2 rounded border border-stone-200">
                                        <span class="text-xl">${d.symbol}</span>
                                        <span class="font-mono text-sm text-orange-600 font-bold">${d.syntax}</span>
                                        <span class="text-xs text-stone-500 uppercase">${d.logic}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="bg-stone-800 p-6 rounded-xl shadow-sm text-stone-300 font-mono text-sm">
                            <div class="flex justify-between items-center mb-2 border-b border-stone-700 pb-2">
                                <span class="text-orange-400 font-sans font-bold">Example Code</span>
                            </div>
                            <pre>${omniScoreData.example}</pre>
                        </div>
                    </div>
                </div>
            `;
        }

        window.filterSyntaxTable = function(query) {
            const rows = document.querySelectorAll('#syntax-tbody tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        function renderEngines(container) {
            container.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-8 animate-fade-in">
                    <div class="mb-6">
                        <h2 class="text-3xl font-serif font-bold text-stone-800 mb-2">The Engines</h2>
                        <p class="text-stone-600">OmniScore uses separate parsing engines depending on the staff <code>style</code> attribute.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        ${omniScoreData.engines.map(eng => `
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-stone-200 flex flex-col h-full hover:border-orange-300 transition-colors">
                                <div class="mb-4">
                                    <span class="text-xs font-bold text-orange-600 uppercase tracking-wide bg-orange-50 px-2 py-1 rounded">style=${eng.id}</span>
                                </div>
                                <h3 class="text-xl font-bold text-stone-800 mb-2">${eng.title}</h3>
                                <p class="text-stone-600 text-sm mb-6 flex-grow">${eng.desc}</p>
                                <ul class="space-y-2">
                                    ${eng.features.map(f => `
                                        <li class="flex items-center gap-2 text-sm text-stone-700">
                                            <span class="text-orange-500">✓</span> ${f}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>

                    <!-- Interactive Definition Builder (Mock) -->

        }
