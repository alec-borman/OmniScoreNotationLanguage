<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScore 1.1.0 Specification Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafaf9; /* Stone 50 */
            color: #44403c; /* Stone 700 */
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f4;
        }
        ::-webkit-scrollbar-thumb {
            background: #d6d3d1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e;
        }

        .code-block {
            background-color: #292524;
            color: #e7e5e4;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.875rem;
            border-left: 4px solid #f97316;
        }

        .active-nav {
            background-color: #e7e5e4; /* Stone 200 */
            border-left: 4px solid #ea580c; /* Orange 600 */
            font-weight: 600;
        }

        .step-connector::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            width: 2rem;
            height: 2px;
            background-color: #d6d3d1;
            transform: translateY(-50%);
            z-index: 0;
        }
        .step-connector:last-child::after {
            display: none;
        }

        /* Sticky State Visualizer */
        .note-block {
            transition: all 0.3s ease;
        }
        .note-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
    <!-- Chosen Palette: Warm Neutrals (Stone/Orange) - Minimalist, Academic, Paper-like feel -->
    <!-- Application Structure Plan: 
         1. Comprehensive Layout: Left sidebar for 6 major Modules containing all 28 spec chapters.
         2. Content Architecture:
            - Module 1: Foundations (Intro, Lexical, Structure, Architecture). Visuals: Pipeline, Grid.
            - Module 2: Instruments (Definitions, Styles, Grouping, Std Lib). Visuals: Syntax breakdown.
            - Module 3: Core Notation (Rhythm, Pitch, Tab, Perc, Attrs). Visuals: Sticky State simulator.
            - Module 4: Structure & Flow (Polyphony, Flow, Lyrics, Macros). Visuals: Voice Layering diagram.
            - Module 5: Advanced Features (Playback, Visuals, MIDI, Engraving). Visuals: Feature toggles.
            - Module 6: Technical Reference (Compiler, Errors, Implementation, Interop, EBNF). Visuals: Error Chart.
         3. Interaction Design: Search bar to filter topics. Dynamic "Try Code" blocks (visual only). 
    -->
    <!-- Visualization & Content Choices:
         - Sticky State Interactive Flow: Goal -> Inform -> Demonstrates how attributes persist -> HTML/CSS Blocks + JS.
         - Feature Breakdown (Doughnut): Goal -> Inform -> Scope of language -> Chart.js.
         - Error Taxonomy (Bar Chart): Goal -> Compare -> Severity levels -> Chart.js.
         - Code Syntax Highlighter (CSS): Goal -> Inform -> Readability -> Custom CSS classes.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-stone-100 border-r border-stone-200 flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6 border-b border-stone-200">
            <h1 class="text-2xl font-bold text-stone-800">OmniScore</h1>
            <p class="text-xs text-stone-500 mt-1 uppercase tracking-wider">Spec Explorer v1.1.0</p>
        </div>
        
        <!-- Search -->
        <div class="p-4 border-b border-stone-200">
            <input type="text" id="sidebar-search" placeholder="Search topics..." 
                class="w-full px-3 py-2 bg-white border border-stone-300 rounded text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>

        <nav class="flex-1 overflow-y-auto py-2">
            <ul class="space-y-1" id="nav-list">
                <!-- Nav Items Injected by JS -->
            </ul>
        </nav>
        <div class="p-4 border-t border-stone-200 bg-stone-50">
            <div class="text-xs text-stone-400">
                Maintained by<br>OmniScore Working Group
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="md:hidden bg-stone-100 border-b border-stone-200 p-4 flex justify-between items-center z-20">
            <h1 class="text-xl font-bold text-stone-800">OmniScore</h1>
            <button id="menu-btn" class="text-stone-600 focus:outline-none">☰</button>
        </header>

        <!-- Dynamic Content Scroll Area -->
        <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-8 scroll-smooth max-w-6xl mx-auto w-full">
            <!-- Content Injected Here -->
        </div>
    </main>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="absolute inset-0 bg-stone-100 z-50 transform -translate-x-full transition-transform duration-300 md:hidden flex flex-col">
        <div class="p-4 flex justify-between items-center border-b border-stone-200">
            <h2 class="font-bold text-lg">Menu</h2>
            <button id="close-menu" class="text-2xl">&times;</button>
        </div>
        <nav class="flex-1 overflow-y-auto p-4">
            <ul class="space-y-2" id="mobile-nav-list"></ul>
        </nav>
    </div>

    <script>
        // --- Data Source: Comprehensive OmniScore v1.1.0 Specification ---
        const omniScoreData = {
            metadata: {
                version: "1.1.0",
                status: "Normative",
                license: "MIT",
                maintainer: "The OmniScore Working Group"
            },
            modules: [
                {
                    id: "foundations",
                    title: "Module 1: Foundations",
                    icon: "🏛️",
                    chapters: [
                        {
                            id: "intro",
                            title: "1. Introduction",
                            content: `<p>OmniScore is to music what Mermaid is to charts. It is a declarative, domain-specific language (DSL) describing musical logic, notation, and performance data. Unlike XML-based formats, it prioritizes musical intent using an inference engine.</p>`,
                            subsections: [
                                { title: "Design Philosophy", text: "1. Inference Over Redundancy (Sticky State). 2. Semantic Separation (Physics vs Data). 3. Human Readability." },
                                { title: "Coordinate System", text: "X-Axis: Time (Linear). Y-Axis: Source (Staves). Z-Axis: Polyphony (Voices)." },
                                { title: "Compilation Pipeline", text: "Lexing -> Context Building -> Linearization -> Rendering." }
                            ]
                        },
                        {
                            id: "lexical",
                            title: "2. Lexical Structure",
                            content: "<p>Source files must be UTF-8. Keywords and Note names are case-insensitive. Identifiers are case-sensitive. Whitespace is insignificant.</p>",
                            code: "%% Comment syntax\nc4:4 %% Inline comment",
                            data_table: [
                                { type: "Integer", syntax: "[0-9]+", ex: "120" },
                                { type: "Float", syntax: "[0-9]+.[0-9]+", ex: "1.5" },
                                { type: "Pitch", syntax: "[a-g][#|b|x]*[0-9]", ex: "c4, f#5" },
                                { type: "TabCoord", syntax: "Fret-String", ex: "0-6" }
                            ]
                        },
                        {
                            id: "doc_struct",
                            title: "3. Document Structure",
                            content: "A valid file has a root <code>omniscore</code> block containing Meta, Definitions, and Flow sections.",
                            code: `omniscore
  meta { title: "My Song", tempo: 120 }
  def ...
  measure 1 ...`
                        }
                    ]
                },
                {
                    id: "instruments",
                    title: "Module 2: Instrument Setup",
                    icon: "🎻",
                    chapters: [
                        {
                            id: "def_physics",
                            title: "4. Definitions (The Physics)",
                            content: "Define the instruments before writing music. This tells the parser how to interpret data (e.g., is '0' a rest, a fret, or a drum?).",
                            code: `def vln "Violin I" style=standard
def gtr "Guitar" style=tab tuning=[E2, A2, D3, G3, B3, E4]
def kit "Drums" style=grid map={k:0, s:4}`,
                            subsections: [
                                { title: "Grouping", text: "Use 'group' blocks with 'symbol' attributes (brace, bracket, line) to organize staves visually." },
                                { title: "Standard Library", text: "Includes standard clefs (treble, bass, alto, tenor, perc, tab) and tunings (guitar_std, bass_std)." }
                            ]
                        }
                    ]
                },
                {
                    id: "core_notation",
                    title: "Module 3: Core Notation",
                    icon: "♩",
                    chapters: [
                        {
                            id: "rhythm",
                            title: "5. Event Engine: Rhythm",
                            content: "Time is linear. Duration is denoted by a colon (:). OmniScore uses 'Sticky State' logic: if duration is omitted, it persists from the previous event.",
                            code: `c4:4 d4 e4 f4  %% First note is 1/4, others inherit 1/4
(c d e):3/2    %% Triplet`,
                            visualizer: "sticky_state" 
                        },
                        {
                            id: "pitch",
                            title: "6. Pitch Engine",
                            content: "Scientific Pitch Notation (SPN). Accidentals are explicit (#, b, x, bb, n). Chords use brackets []. Ties use tilde ~.",
                            code: `c4 e4 g4       %% Individual notes
[c4 e4 g4]:4   %% Chord
c4:4~ c4:8     %% Tie`
                        },
                        {
                            id: "attributes",
                            title: "7. Attributes",
                            content: "Decorate events with dot notation for dynamics, articulations, and text.",
                            code: `c4:4.ff.stacc
c4."Sim."`
                        },
                        {
                            id: "tab_perc",
                            title: "8 & 9. Tab & Percussion",
                            content: "Tab uses Fret-String coordinates. Percussion uses mapped character keys.",
                            code: `gtr: 0-6 2-5 3-5.bu(full)  %% Tab
drm: k:4 s:8.ghost s:8     %% Percussion`
                        }
                    ]
                },
                {
                    id: "structure",
                    title: "Module 4: Structure & Flow",
                    icon: "🔀",
                    chapters: [
                        {
                            id: "polyphony",
                            title: "10. Advanced Polyphony",
                            content: "Multi-threading within a single staff using Voice Groups { v1: ... | v2: ... }.",
                            code: `piano: {
  v1: c5:4 d5 e5 |
  v2: c4:2 g4:2  |
}`
                        },
                        {
                            id: "flow",
                            title: "11. Flow Control",
                            content: "Repeats (|: :|), Voltas ([1. ... ]), and Navigation (D.S., Coda).",
                            code: `measure 1
  vln: |: c4 d e f :|`
                        },
                        {
                            id: "lyrics",
                            title: "12. Lyric Engine",
                            content: "Map syllables 1-to-1 with notes. Use hyphens (-) and underscores (_) for melismas.",
                            code: `vox: c4 d4 e4
vox.lyric: "Hel- lo world"`
                        },
                        {
                            id: "macros",
                            title: "15. Macros",
                            content: "Text substitution for repetitive patterns. Invoke with $.",
                            code: `macro Riff = { c4 e g }
measure 1
  gtr: $Riff $Riff+2`
                        }
                    ]
                },
                {
                    id: "advanced",
                    title: "Module 5: Advanced Features",
                    icon: "✨",
                    chapters: [
                        {
                            id: "playback",
                            title: "14. Playback & Synth",
                            content: "Define patches (General MIDI) and control Volume/Pan via metadata.",
                            code: `def syn "Lead" patch="Sawtooth"
meta { syn.vol: 80, syn.pan: -64 }`
                        },
                        {
                            id: "midi",
                            title: "21. Advanced MIDI",
                            content: "Send raw CC messages and automation curves.",
                            code: `c4:1.cc(1, 127)       %% Mod wheel max
c4:1.cc(11, [0, 100]) %% Expression swell`
                        },
                        {
                            id: "visuals",
                            title: "20. Visual Styling",
                            content: "Theme profiles (jazz, educational) and color overrides.",
                            code: `meta { theme: "jazz" }
c4.color("red").head("diamond")`
                        },
                        {
                            id: "microtonal",
                            title: "19. Microtonality",
                            content: "Quarter-tone syntax (qs, qf) and cent deviation (+/-).",
                            code: `c4+14:4   %% 14 cents sharp
d4qf      %% Quarter-flat`
                        }
                    ]
                },
                {
                    id: "reference",
                    title: "Module 6: Tech Reference",
                    icon: "🛠️",
                    chapters: [
                        {
                            id: "compiler",
                            title: "22. Compiler Directives",
                            content: "Strict mode for validation and Conditional Compilation for targets.",
                            code: `meta { strict: true }
if (midi) { ... }`
                        },
                        {
                            id: "grammar",
                            title: "27. Formal Grammar (EBNF)",
                            content: "Simplified EBNF for parser implementation.",
                            code: `Program ::= 'omniscore' Meta? Def+ Measure+
Event   ::= (Note | Chord | Rest) Duration? Mod*`
                        },
                        {
                            id: "errors",
                            title: "24. Error Reference",
                            content: "Diagnostic codes.",
                            chart: "errors"
                        }
                    ]
                }
            ],
            errors: [
                { code: "E101", level: "Fatal", name: "SYNTAX_ERR" },
                { code: "E201", level: "Fatal", name: "DEF_MISSING" },
                { code: "E301", level: "Error", name: "VOICE_SYNC" },
                { code: "E302", level: "Error", name: "TIME_OVERFLOW" },
                { code: "W401", level: "Warning", name: "BEAM_OPEN" },
                { code: "W402", level: "Warning", name: "OCTAVE_JUMP" }
            ]
        };

        // --- State Management ---
        const state = {
            currentModule: 0,
            searchQuery: ''
        };

        // --- Init ---
        function init() {
            renderSidebar();
            renderModule(0);
            
            // Search Listener
            document.getElementById('sidebar-search').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.nav-item');
                items.forEach(item => {
                    const text = item.innerText.toLowerCase();
                    item.style.display = text.includes(query) ? 'flex' : 'none';
                });
            });

            document.getElementById('menu-btn').addEventListener('click', toggleMobileMenu);
            document.getElementById('close-menu').addEventListener('click', toggleMobileMenu);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('-translate-x-full');
        }

        function renderSidebar() {
            const navList = document.getElementById('nav-list');
            const mobileNavList = document.getElementById('mobile-nav-list');
            
            const html = omniScoreData.modules.map((mod, index) => `
                <li class="nav-item">
                    <button onclick="navigateTo(${index})" 
                        class="w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 transition-colors text-sm ${state.currentModule === index ? 'active-nav text-stone-800' : 'text-stone-600 hover:bg-stone-200'}">
                        <span>${mod.icon}</span>
                        <span class="font-medium">${mod.title}</span>
                    </button>
                </li>
            `).join('');

            navList.innerHTML = html;
            mobileNavList.innerHTML = html;
        }

        function navigateTo(index) {
            state.currentModule = index;
            renderSidebar();
            renderModule(index);
            document.getElementById('mobile-menu').classList.add('-translate-x-full');
        }

        // --- Content Rendering ---
        function renderModule(index) {
            const module = omniScoreData.modules[index];
            const container = document.getElementById('content-area');
            
            // Generate Module Header
            let html = `
                <div class="mb-8 animate-fade-in">
                    <h2 class="text-3xl md:text-4xl font-serif font-bold text-stone-800 mb-2">${module.title}</h2>
                    <div class="h-1 w-20 bg-orange-500 rounded"></div>
                </div>
            `;

            // Introduction Component (Special Case for Module 1)
            if (module.id === "foundations") {
                html += renderIntroComponent();
            }

            // Generate Chapters
            html += `<div class="grid grid-cols-1 gap-12">`;
            module.chapters.forEach(chap => {
                html += `
                    <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                        <div class="p-6 border-b border-stone-100 bg-stone-50">
                            <h3 class="text-xl font-bold text-stone-800">${chap.title}</h3>
                        </div>
                        <div class="p-6 space-y-6">
                            <div class="prose prose-stone text-stone-600 max-w-none">
                                ${chap.content}
                            </div>
                            
                            ${chap.subsections ? chap.subsections.map(sub => `
                                <div class="pl-4 border-l-2 border-orange-200">
                                    <h4 class="font-bold text-stone-700 text-sm">${sub.title}</h4>
                                    <p class="text-sm text-stone-600">${sub.text}</p>
                                </div>
                            `).join('') : ''}

                            ${chap.data_table ? renderTable(chap.data_table) : ''}
                            
                            ${chap.visualizer === 'sticky_state' ? renderStickyVisualizer() : ''}
                            
                            ${chap.chart === 'errors' ? renderErrorChartHTML() : ''}

                            ${chap.code ? `
                                <div class="bg-stone-800 rounded-lg p-4 shadow-inner relative group">
                                    <div class="absolute top-2 right-2 text-xs text-stone-500 font-mono">OMNISCORE</div>
                                    <pre class="font-mono text-sm text-stone-300 overflow-x-auto">${chap.code}</pre>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            html += `</div>`;

            container.innerHTML = html;

            // Post-render scripts
            if (module.id === "foundations") renderPipeline();
            if (module.id === "reference") renderErrorChartJS();
        }

        // --- Helper Components ---

        function renderIntroComponent() {
            return `
                <div class="bg-gradient-to-r from-stone-800 to-stone-700 text-stone-100 rounded-xl p-8 mb-10 shadow-lg">
                    <div class="grid md:grid-cols-2 gap-8 items-center">
                        <div>
                            <h3 class="text-2xl font-serif font-bold mb-4 text-orange-400">Philosophy</h3>
                            <p class="mb-4 leading-relaxed">OmniScore is designed to be readable by humans and parseable by machines without redundancy. It separates the <em>Physics</em> (instrument defs) from the <em>Performance</em> (notes).</p>
                            <div class="bg-white/10 p-4 rounded-lg backdrop-blur-sm border border-white/10">
                                <span class="font-bold text-orange-300">The Analogy:</span><br>
                                "What Mermaid is to charts, OmniScore is to music."
                            </div>
                        </div>
                        <div class="space-y-4">
                            <h4 class="font-bold border-b border-white/20 pb-2">Architecture</h4>
                            <div id="pipeline-container" class="flex justify-between text-xs text-center">
                                <!-- JS Injected -->
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPipeline() {
            const steps = [
                {t: "Lexing", d: "Tokenize"}, 
                {t: "Context", d: "Build Physics"}, 
                {t: "Linearize", d: "Resolve Time"}, 
                {t: "Render", d: "Output SVG"}
            ];
            const el = document.getElementById('pipeline-container');
            if(el) {
                el.innerHTML = steps.map((s, i) => `
                    <div class="flex flex-col items-center gap-2 group cursor-default">
                        <div class="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center font-bold shadow-lg ring-4 ring-white/10">${i+1}</div>
                        <div class="opacity-80">
                            <div class="font-bold">${s.t}</div>
                            <div class="text-[10px] uppercase tracking-wide text-stone-400">${s.d}</div>
                        </div>
                    </div>
                `).join('<div class="h-0.5 w-8 bg-white/20 self-start mt-5"></div>');
            }
        }

        function renderTable(data) {
            return `
                <div class="overflow-x-auto border border-stone-200 rounded-lg">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-stone-100 text-stone-700 font-semibold">
                            <tr>
                                <th class="p-3">Type</th>
                                <th class="p-3">Syntax</th>
                                <th class="p-3">Example</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-stone-100 bg-white">
                            ${data.map(r => `
                                <tr>
                                    <td class="p-3 font-medium">${r.type}</td>
                                    <td class="p-3 font-mono text-orange-600 bg-stone-50">${r.syntax}</td>
                                    <td class="p-3 font-mono text-stone-500">${r.ex}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderStickyVisualizer() {
            return `
                <div class="bg-orange-50 border border-orange-100 p-4 rounded-lg mt-4">
                    <h4 class="text-sm font-bold text-orange-800 mb-3 flex items-center gap-2">
                        <span>🔄</span> Sticky State Simulator
                    </h4>
                    <div class="grid grid-cols-4 gap-2 text-center text-xs font-mono">
                        <div class="bg-white border border-orange-200 p-2 rounded shadow-sm">
                            <div class="text-stone-400">Input</div>
                            <div class="font-bold text-stone-800">c4:4</div>
                        </div>
                        <div class="bg-white border-dashed border-2 border-stone-300 p-2 rounded opacity-75">
                            <div class="text-stone-400">Input</div>
                            <div class="font-bold text-stone-800">d4</div>
                            <div class="text-[10px] text-orange-500">(:4 implied)</div>
                        </div>
                        <div class="bg-white border-dashed border-2 border-stone-300 p-2 rounded opacity-75">
                            <div class="text-stone-400">Input</div>
                            <div class="font-bold text-stone-800">e4</div>
                            <div class="text-[10px] text-orange-500">(:4 implied)</div>
                        </div>
                        <div class="bg-white border border-orange-200 p-2 rounded shadow-sm">
                            <div class="text-stone-400">Input</div>
                            <div class="font-bold text-stone-800">f4:8</div>
                            <div class="text-[10px] text-green-600">(New State)</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderErrorChartHTML() {
            return `
                <div class="bg-white p-4 rounded-lg border border-stone-200">
                    <h4 class="text-center font-bold text-stone-600 mb-4">Error Severity</h4>
                    <div class="chart-container" style="height: 200px;">
                        <canvas id="errorChart"></canvas>
                    </div>
                </div>
            `;
        }

        function renderErrorChartJS() {
            const ctx = document.getElementById('errorChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Fatal (Halts)', 'Error (Skips)', 'Warning (Continues)'],
                    datasets: [{
                        label: 'Count',
                        data: [2, 2, 2],
                        backgroundColor: ['#ef4444', '#f97316', '#eab308'],
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        // Start
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
